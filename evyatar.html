<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Document</title>

<style>
body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    background: linear-gradient(135deg, #0e3c72 0%, #2a9d8f 100%);
    color: #0f2a44;
    font-family: Arial, sans-serif;
}

#part1 {
    width: 520px;
    background: rgba(255, 255, 255, 0.95);
    border-radius: 24px;
    padding: 30px 32px;
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.12);
    text-align: center;
}

input[type="text"],
input[type="number"] {
    width: 100%;
    padding: 12px 14px;
    margin: 10px 0;
    border: 1px solid #a8d0e6;
    border-radius: 12px;
    background: #f4fbff;
    font-size: 16px;
    box-sizing: border-box;
}

button {
    padding: 12px 22px;
    background-color: #2a9d8f;
    color: white;
    border: none;
    border-radius: 999px;
    cursor: pointer;
    font-size: 15px;
}

button:hover {
    background-color: #227c6f;
}

#quality_meter {
    margin: 24px 0 10px;
    padding: 18px 16px;
    background: #e9f7f6;
    border: 1px solid #bbe1df;
    border-radius: 18px;
}

#score_bar_wrapper {
    width: 100%;
    height: 12px;
    background: #d8edf0;
    border-radius: 999px;
    overflow: hidden;
}

#score_bar {
    height: 100%;
    width: 50%;
    transition: width 0.3s ease;
    background: #2a9d8f;
}

#prompt_output {
    margin-top: 30px;
    background: #f1fcfb;
    border: 1px solid #b5e5db;
    border-radius: 16px;
    padding: 14px;
    white-space: pre-wrap;
}
</style>

</head>

<body>

<div id="part1">
<h1>חלק ראשון</h1>

<input id="topic" type="text" placeholder="נושא העבודה">
<input id="background" type="text" placeholder="רקע על העבודה">

<div id="quality_meter">
<p>מד איכות</p>
<div id="score_bar_wrapper">
  <div id="score_bar"></div>
</div>
<p id="score_label">50%</p>
<button onclick="updateQualityMeter()">בדיקת איכות</button>
</div>

<button onclick="submitPrompt()">להפוך לפרומפט</button>

<div id="prompt_output"></div>
</div>

<script>

/* ===================== AI MOCK ===================== */
let aiService = {
  async sendQuery(type, text, state) {
    return {
      ...state,
      subject: "לא ידוע",
      topic: text
    };
  }
};

/* ===================== CORE ===================== */

const MIN_INITIAL_TEXT_LENGTH = 10;
const MAX_INITIAL_TEXT_LENGTH = 4000;

function createNewState() {
  return {
    rawText: null,
    subject: null,
    topic: null
  };
}

function handleError(msg) {
  console.error(msg);
}

async function initProject(rawText) {
  if (typeof rawText !== "string") return null;

  let normalizedText = rawText.trim().replace(/\s+/g, " ");
  if (!normalizedText) return null;

  if (normalizedText.length < MIN_INITIAL_TEXT_LENGTH) return null;
  if (normalizedText.length > MAX_INITIAL_TEXT_LENGTH) return null;

  let state = createNewState();
  state.rawText = normalizedText;

  try {
    return await aiService.sendQuery("INIT", normalizedText, state);
  } catch (e) {
    console.error(e);
    return null;
  }
}

/* ===================== ANALYSIS ===================== */

function analyzeActionability(text) {
  if (!text || text.length < 20) return false;
  return text.split(" ").length > 5;
}

/* ===================== UI ===================== */

function updateQualityMeter() {
  let topic = document.getElementById("topic").value;
  let background = document.getElementById("background").value;

  let combined = topic + " " + background;

  let good = analyzeActionability(combined);

  let score = good ? 80 : 30;

  document.getElementById("score_bar").style.width = score + "%";
  document.getElementById("score_label").textContent = score + "%";
}

async function submitPrompt() {
  let topic = document.getElementById("topic").value;
  let background = document.getElementById("background").value;

  let fullText = topic + " " + background;

  let result = await initProject(fullText);

  if (!result) {
    document.getElementById("prompt_output").textContent = "שגיאה בעיבוד";
    return;
  }

  document.getElementById("prompt_output").textContent =
    "נושא: " + result.subject + "\n" +
    "טקסט: " + result.rawText;
}

</script>

</body>
</html>
