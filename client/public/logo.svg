<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 380">
  <defs>
    <!-- Circle border gradient: purple left → white top → blue right -->
    <linearGradient id="cg" gradientUnits="userSpaceOnUse" x1="42" y1="148" x2="258" y2="148">
      <stop offset="0%"   stop-color="#cc44ff"/>
      <stop offset="45%"  stop-color="#e8d0ff"/>
      <stop offset="50%"  stop-color="#ffffff"/>
      <stop offset="55%"  stop-color="#d0e8ff"/>
      <stop offset="100%" stop-color="#44aaff"/>
    </linearGradient>

    <!-- Soft outer glow -->
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowLg" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="12" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="300" height="380" fill="#0b0b1e"/>

  <!-- Outer halo -->
  <circle cx="150" cy="148" r="116" fill="none" stroke="url(#cg)" stroke-width="10" opacity="0.2" filter="url(#glowLg)"/>

  <!-- Main circle border -->
  <circle cx="150" cy="148" r="108" fill="none" stroke="url(#cg)" stroke-width="3.5" filter="url(#glow)"/>

  <!-- Chat bubble tail (bottom-right, angular) -->
  <path d="M 162 254 L 188 284 L 146 262" fill="none"
        stroke="url(#cg)" stroke-width="3.5" stroke-linejoin="round" filter="url(#glow)"/>
  <!-- Erase circle border inside tail opening -->
  <rect x="142" y="252" width="52" height="7" fill="#0b0b1e"/>

  <!-- ============ BRAIN (outline / stroke only) ============ -->

  <!-- LEFT hemisphere outline (purple) — bumpy top, round sides -->
  <path d="
    M 150 86
    C 147 77, 139 68, 131 72
    C 124 76, 119 70, 113 77
    C 107 84, 106 96, 110 108
    C 105 119, 108 133, 118 141
    C 124 151, 136 158, 150 158
  " fill="none" stroke="#cc44ff" stroke-width="3.5"
    stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

  <!-- Left gyri wrinkles -->
  <path d="M 128 77 Q 121 87 127 93"  fill="none" stroke="#cc44ff" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M 114 104 Q 111 115 118 118" fill="none" stroke="#cc44ff" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M 116 132 Q 113 142 122 144" fill="none" stroke="#cc44ff" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)"/>

  <!-- RIGHT hemisphere outline (blue) — mirror -->
  <path d="
    M 150 86
    C 153 77, 161 68, 169 72
    C 176 76, 181 70, 187 77
    C 193 84, 194 96, 190 108
    C 195 119, 192 133, 182 141
    C 176 151, 164 158, 150 158
  " fill="none" stroke="#44aaff" stroke-width="3.5"
    stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

  <!-- Right gyri wrinkles -->
  <path d="M 172 77 Q 179 87 173 93"  fill="none" stroke="#44aaff" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M 186 104 Q 189 115 182 118" fill="none" stroke="#44aaff" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M 184 132 Q 187 142 178 144" fill="none" stroke="#44aaff" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Center divider line -->
  <line x1="150" y1="86" x2="150" y2="158" stroke="#0b0b1e" stroke-width="3"/>

  <!-- ============ BOOK (open pages, stroke only) ============ -->

  <!-- Book spine -->
  <line x1="150" y1="172" x2="150" y2="207"
        stroke="white" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Left pages — 3 arcs sweeping left (purple) -->
  <path d="M 148 177 Q 126 170  98 172" fill="none" stroke="#cc44ff" stroke-width="3"   stroke-linecap="round" filter="url(#glow)"/>
  <path d="M 148 186 Q 124 181  94 186" fill="none" stroke="#cc44ff" stroke-width="3"   stroke-linecap="round" filter="url(#glow)"/>
  <path d="M 148 195 Q 122 195  92 202" fill="none" stroke="#cc44ff" stroke-width="3"   stroke-linecap="round" filter="url(#glow)"/>

  <!-- Right pages — 3 arcs sweeping right (blue) -->
  <path d="M 152 177 Q 174 170 202 172" fill="none" stroke="#44aaff" stroke-width="3"   stroke-linecap="round" filter="url(#glow)"/>
  <path d="M 152 186 Q 176 181 206 186" fill="none" stroke="#44aaff" stroke-width="3"   stroke-linecap="round" filter="url(#glow)"/>
  <path d="M 152 195 Q 178 195 208 202" fill="none" stroke="#44aaff" stroke-width="3"   stroke-linecap="round" filter="url(#glow)"/>

  <!-- ============ TEXT ============ -->
  <text x="150" y="316" text-anchor="middle"
        font-family="'SF Pro Display','Helvetica Neue',Helvetica,Arial,sans-serif"
        font-weight="700" font-size="52" letter-spacing="1.5">
    <tspan fill="white">Think </tspan><tspan fill="#c8d8ff">Step</tspan>
  </text>
</svg>
